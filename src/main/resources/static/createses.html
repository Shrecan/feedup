<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Session</title>
    <link rel="stylesheet" href="css/createses.css">
</head>
<body>
    <header class="create-header">
        <div class="create-header__inner">
            <a class="brand" href="home.html">FeedUp</a>
            <a class="back-button" href="home.html">Back</a>
        </div>
    </header>

    <main class="create-page">
        <section class="create-card">
            <h1>Create Session</h1>
            <label class="field-group" for="sessionName">
                <span>Session Name</span>
                <input type="text" id="sessionName" placeholder="Enter session name">
            </label>
            <button class="generate-button" id="generateLinkBtn">Generate Link</button>
            <p id="message" class="message"></p>
        </section>
    </main>
    <script src="js/auth.js"></script>
    <script>requireLogin();</script>
    <script src="js/createses.js"></script>
</body>
</html>
