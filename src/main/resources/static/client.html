<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeedUp Feedback</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <main class="page">
        <section class="panel stack">
            <div>
                <h1 id="sessionName">Feedback Session</h1>
                <p class="muted">Created: <span id="createdDate"></span> | Expires: <span id="expiryDate"></span></p>
            </div>
            <label>Name<input type="text" id="nameInput" placeholder="Enter your name" required></label>
            <label>Email<input type="email" id="emailInput" placeholder="name@example.com"></label>
            <form id="feedbackForm" class="stack"></form>
            <label>Comments<textarea id="commentBox" placeholder="Write your comments"></textarea></label>
            <button id="submitFeedbackBtn">Submit Feedback</button>
        </section>
    </main>
    <script src="js/client.js"></script>
</body>
</html>
